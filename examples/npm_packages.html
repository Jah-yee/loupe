<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>npm_packages.json — loupe</title>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;--bg2:#18181b;--bg3:#27272a;
  --border:#3f3f46;--text:#e4e4e7;--sub:#a1a1aa;--muted:#71717a;
  --accent:#6366f1;--accent2:#a855f7;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  --radius:10px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;
  --mono:'SF Mono','Cascadia Code','JetBrains Mono',Consolas,monospace;
}
[data-theme=light]{
  --bg:#fafaf9;--bg2:#ffffff;--bg3:#f5f5f4;
  --border:#e7e5e4;--text:#1c1917;--sub:#78716c;--muted:#a8a29e;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh}
header{
  display:flex;align-items:center;gap:16px;padding:18px 24px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:10;flex-wrap:wrap;
}
.logo{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.meta{color:var(--sub);font-size:13px;white-space:nowrap}
.search{
  flex:1;min-width:160px;max-width:320px;padding:7px 12px;
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:13px;outline:none;margin-left:auto;
}
.search:focus{border-color:var(--accent)}
.btn{
  padding:6px 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg3);color:var(--sub);cursor:pointer;font-size:12px;
  white-space:nowrap;
}
.btn:hover{border-color:var(--accent);color:var(--text)}
.stats-row{
  display:flex;gap:12px;padding:16px 24px;flex-wrap:wrap;
  border-bottom:1px solid var(--border);background:var(--bg);
}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 16px;min-width:130px;flex:1;max-width:200px;
}
.stat-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.stat-val{font-size:18px;font-weight:600;color:var(--text)}
.stat-sub{font-size:11px;color:var(--sub);margin-top:2px}
.bar{height:4px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.table-wrap{overflow-x:auto;padding:0 24px 24px}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:16px}
th{
  text-align:left;padding:10px 12px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);border-bottom:1px solid var(--border);cursor:pointer;
  white-space:nowrap;user-select:none;background:var(--bg);position:sticky;top:62px;
}
th:hover{color:var(--accent)}
th .sort-icon{margin-left:4px;opacity:.4;font-size:10px}
th.sorted .sort-icon{opacity:1;color:var(--accent)}
td{
  padding:9px 12px;border-bottom:1px solid var(--border);
  color:var(--text);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
tr:hover td{background:var(--bg3)}
td.num{font-family:var(--mono);font-size:12px;color:var(--text)}
td.bool-true{color:var(--green)}
td.bool-false{color:var(--red)}
.mini-bar{
  display:inline-block;height:4px;background:var(--accent);
  border-radius:2px;vertical-align:middle;margin-left:6px;opacity:.6;
}
footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;border-top:1px solid var(--border);
  color:var(--sub);font-size:12px;background:var(--bg2);flex-wrap:wrap;gap:8px;
}
.page-btns{display:flex;gap:6px;align-items:center}
.page-btn{
  padding:4px 10px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg3);color:var(--sub);cursor:pointer;font-size:12px;
}
.page-btn:hover{border-color:var(--accent);color:var(--text)}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.empty{text-align:center;padding:48px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <div class="logo">⊙ loupe</div>
  <div class="meta">npm_packages.json · 7 cols · 20 rows</div>
  <input class="search" id="search" type="search" placeholder="Search all columns…" autocomplete="off">
  <button class="btn" id="theme-btn" onclick="toggleTheme()">◑</button>
</header>
<div class="stats-row"><div class="stat-card"><div class="stat-label">weekly_downloads</div><div class="stat-val">48290000.0</div><div class="stat-sub">avg · 4100000–211000000</div><div class="bar"><div class="bar-fill" style="width:21%"></div></div></div> <div class="stat-card"><div class="stat-label">size_kb</div><div class="stat-val">6456.6</div><div class="stat-sub">avg · 18–70800</div><div class="bar"><div class="bar-fill" style="width:9%"></div></div></div></div>
<div class="table-wrap">
  <table>
    <thead><tr><th data-col="name">name<span class="sort-icon">↕</span></th><th data-col="weekly_downloads">weekly_downloads<span class="sort-icon">↕</span></th><th data-col="version">version<span class="sort-icon">↕</span></th><th data-col="license">license<span class="sort-icon">↕</span></th><th data-col="size_kb">size_kb<span class="sort-icon">↕</span></th><th data-col="typescript">typescript<span class="sort-icon">↕</span></th><th data-col="deprecated">deprecated<span class="sort-icon">↕</span></th></tr></thead>
    <tbody></tbody>
  </table>
</div>
<footer>
  <span id="footer-info"></span>
  <div class="page-btns" id="pager"></div>
</footer>
<script>
const DATA = [{"name": "react", "weekly_downloads": "23400000", "version": "18.3.1", "license": "MIT", "size_kb": "89", "typescript": "yes", "deprecated": "no"}, {"name": "lodash", "weekly_downloads": "49100000", "version": "4.17.21", "license": "MIT", "size_kb": "531", "typescript": "yes", "deprecated": "no"}, {"name": "express", "weekly_downloads": "33800000", "version": "4.19.2", "license": "MIT", "size_kb": "208", "typescript": "yes", "deprecated": "no"}, {"name": "axios", "weekly_downloads": "51200000", "version": "1.7.2", "license": "MIT", "size_kb": "145", "typescript": "yes", "deprecated": "no"}, {"name": "moment", "weekly_downloads": "18900000", "version": "2.30.1", "license": "MIT", "size_kb": "4340", "typescript": "yes", "deprecated": "yes"}, {"name": "chalk", "weekly_downloads": "211000000", "version": "5.3.0", "license": "MIT", "size_kb": "18", "typescript": "yes", "deprecated": "no"}, {"name": "uuid", "weekly_downloads": "89400000", "version": "9.0.1", "license": "MIT", "size_kb": "42", "typescript": "yes", "deprecated": "no"}, {"name": "dotenv", "weekly_downloads": "45600000", "version": "16.4.5", "license": "BSD-2", "size_kb": "27", "typescript": "yes", "deprecated": "no"}, {"name": "typescript", "weekly_downloads": "68700000", "version": "5.5.2", "license": "Apache-2.0", "size_kb": "70800", "typescript": "yes", "deprecated": "no"}, {"name": "jest", "weekly_downloads": "21300000", "version": "29.7.0", "license": "MIT", "size_kb": "1120", "typescript": "yes", "deprecated": "no"}, {"name": "webpack", "weekly_downloads": "25100000", "version": "5.92.1", "license": "MIT", "size_kb": "5840", "typescript": "yes", "deprecated": "no"}, {"name": "eslint", "weekly_downloads": "39800000", "version": "9.5.0", "license": "MIT", "size_kb": "2910", "typescript": "yes", "deprecated": "no"}, {"name": "prettier", "weekly_downloads": "36500000", "version": "3.3.2", "license": "MIT", "size_kb": "9840", "typescript": "yes", "deprecated": "no"}, {"name": "next", "weekly_downloads": "7800000", "version": "14.2.4", "license": "MIT", "size_kb": "22400", "typescript": "yes", "deprecated": "no"}, {"name": "vue", "weekly_downloads": "4100000", "version": "3.4.31", "license": "MIT", "size_kb": "396", "typescript": "yes", "deprecated": "no"}, {"name": "zod", "weekly_downloads": "23600000", "version": "3.23.8", "license": "MIT", "size_kb": "284", "typescript": "yes", "deprecated": "no"}, {"name": "tailwindcss", "weekly_downloads": "12900000", "version": "3.4.4", "license": "MIT", "size_kb": "5230", "typescript": "no", "deprecated": "no"}, {"name": "vite", "weekly_downloads": "18400000", "version": "5.3.1", "license": "MIT", "size_kb": "4610", "typescript": "yes", "deprecated": "no"}, {"name": "commander", "weekly_downloads": "104000000", "version": "12.1.0", "license": "MIT", "size_kb": "98", "typescript": "yes", "deprecated": "no"}, {"name": "yargs", "weekly_downloads": "81200000", "version": "17.7.2", "license": "MIT", "size_kb": "204", "typescript": "yes", "deprecated": "no"}];
const COLS = ["name", "weekly_downloads", "version", "license", "size_kb", "typescript", "deprecated"];
const TYPES = {"name": "text", "weekly_downloads": "number", "version": "text", "license": "text", "size_kb": "number", "typescript": "boolean", "deprecated": "boolean"};

const PAGE_SIZE = 50;
let filtered = DATA;
let sortCol = null, sortDir = 1, page = 0;
let query = "";

const tbody = document.querySelector("tbody");
const footer_info = document.getElementById("footer-info");
const search = document.getElementById("search");

function parseNum(v) {
  return parseFloat(String(v).replace(/[,$%€£]/g, "")) || 0;
}

function sort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  page = 0;
  render();
  document.querySelectorAll("th").forEach(th => {
    th.classList.toggle("sorted", th.dataset.col === col);
    if (th.dataset.col === col)
      th.querySelector(".sort-icon").textContent = sortDir > 0 ? "↑" : "↓";
    else
      th.querySelector(".sort-icon").textContent = "↕";
  });
}

function filter(q) {
  query = q.toLowerCase();
  page = 0;
  filtered = query
    ? DATA.filter(row => COLS.some(c => String(row[c] ?? "").toLowerCase().includes(query)))
    : DATA;
  render();
}

function render() {
  let rows = filtered.slice();
  if (sortCol) {
    rows.sort((a, b) => {
      const av = a[sortCol] ?? "", bv = b[sortCol] ?? "";
      if (TYPES[sortCol] === "number")
        return (parseNum(av) - parseNum(bv)) * sortDir;
      return String(av).localeCompare(String(bv)) * sortDir;
    });
  }

  // Column mins/maxes for mini bars
  const numMeta = {};
  for (const c of COLS) {
    if (TYPES[c] === "number") {
      const vals = rows.map(r => parseNum(r[c]));
      numMeta[c] = { min: Math.min(...vals), max: Math.max(...vals) };
    }
  }

  const slice = rows.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
  const total = rows.length;
  const start = page * PAGE_SIZE + 1;
  const end = Math.min((page + 1) * PAGE_SIZE, total);

  tbody.innerHTML = slice.length ? slice.map(row => `
    <tr>${COLS.map(c => {
      const v = row[c] ?? "";
      const t = TYPES[c];
      if (t === "number") {
        const n = parseNum(v);
        const {min, max} = numMeta[c];
        const pct = max !== min ? Math.round((n - min) / (max - min) * 60) : 60;
        return `<td class="num">${v}<span class="mini-bar" style="width:${pct}px"></span></td>`;
      }
      if (t === "boolean") {
        const b = ["true","yes","1","t","y"].includes(String(v).toLowerCase());
        return `<td class="bool-${b}">${b ? "✓" : "✗"}</td>`;
      }
      return `<td title="${String(v).replace(/"/g,'&quot;')}">${v}</td>`;
    }).join("")}
    </tr>`).join("") : `<tr><td class="empty" colspan="${COLS.length}">No results found</td></tr>`;

  footer_info.textContent = total === DATA.length
    ? `Showing ${start}–${end} of ${total.toLocaleString()} rows`
    : `${total.toLocaleString()} matches · showing ${start}–${end}`;

  renderPager(total);
}

function renderPager(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  const pager = document.getElementById("pager");
  if (pages <= 1) { pager.innerHTML = ""; return; }
  const range = [];
  for (let i = 0; i < pages; i++) {
    if (i === 0 || i === pages-1 || Math.abs(i - page) <= 2) range.push(i);
    else if (range[range.length-1] !== "…") range.push("…");
  }
  pager.innerHTML = [
    `<button class="page-btn" onclick="go(${page-1})" ${page===0?"disabled":""}>←</button>`,
    ...range.map(i => i === "…"
      ? `<span style="color:var(--muted)">…</span>`
      : `<button class="page-btn ${i===page?"active":""}" onclick="go(${i})">${i+1}</button>`),
    `<button class="page-btn" onclick="go(${page+1})" ${page>=pages-1?"disabled":""}>→</button>`,
  ].join("");
}

function go(p) {
  const pages = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 0 || p >= pages) return;
  page = p;
  render();
  window.scrollTo(0, 0);
}

function toggleTheme() {
  const t = document.documentElement.dataset.theme === "light" ? "dark" : "light";
  document.documentElement.dataset.theme = t === "dark" ? "" : "light";
  document.getElementById("theme-btn").textContent = t === "light" ? "☀" : "◑";
}

search.addEventListener("input", e => filter(e.target.value));
document.querySelectorAll("th[data-col]").forEach(th =>
  th.addEventListener("click", () => sort(th.dataset.col)));

render();
</script>
</body>
</html>
